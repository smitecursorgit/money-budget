services:
  - type: web
    name: money-budget-backend
    runtime: node
    rootDir: backend
    branch: main
    buildCommand: npm install && npx prisma migrate deploy && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: MINI_APP_URL
        sync: false
      - key: BACKEND_URL
        sync: false
